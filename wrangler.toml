#:schema node_modules/wrangler/config-schema.json
name = "amislop"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# --- D1 Database ---
[[d1_databases]]
binding = "DB"
database_name = "amislop-db"
database_id = "local"  # Replace with real ID after `wrangler d1 create`

# --- KV Namespaces ---
[[kv_namespaces]]
binding = "KV"
id = "local"  # Replace with real ID after `wrangler kv namespace create`

# --- Workers AI ---
[ai]
binding = "AI"

# --- Vectorize ---
[[vectorize]]
binding = "VECTORIZE"
index_name = "slop-fingerprints"
